<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="120" fill="#ffffff"/>
  
  <!-- Top Section: Security Badges -->
  <g>
    <!-- Left: Secure Checkout / SSL Encryption -->
    <g transform="translate(30, 20)">
      <!-- Padlock Icon -->
      <g transform="translate(0, 5)">
        <rect x="2" y="12" width="20" height="16" rx="2" stroke="#2d3748" stroke-width="2" fill="none"/>
        <path d="M8 12V7C8 3.68629 10.6863 1 14 1C17.3137 1 20 3.68629 20 7V12"
              stroke="#2d3748" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="20" r="2" fill="#2d3748"/>
      </g>
      <!-- SECURE CHECKOUT Text -->
      <text x="35" y="18" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-transform="uppercase">
        SECURE CHECKOUT
      </text>
      <!-- SSL ENCRYPTION Text -->
      <text x="35" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-transform="uppercase">
        SSL ENCRYPTION
      </text>
    </g>
    
    <!-- Right: Privacy / Protected -->
    <g transform="translate(320, 20)">
      <!-- Shield Icon -->
      <g transform="translate(0, 5)">
        <path d="M18 3L9 6.75V15.75C9 23.625 14.0625 31.0125 21 33C27.9375 31.0125 33 23.625 33 15.75V6.75L18 3Z"
              fill="#2d3748" stroke="#2d3748" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 18L19.5 22.5L27 13.5"
              stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <!-- PRIVACY Text -->
      <text x="35" y="18" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-transform="uppercase">
        PRIVACY
      </text>
      <!-- PROTECTED Text -->
      <text x="35" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-transform="uppercase">
        PROTECTED
      </text>
    </g>
  </g>
  
  <!-- Bottom Section: Payment Methods -->
  <g transform="translate(0, 70)">
    <!-- VISA -->
    <g transform="translate(30, 0)">
      <rect width="80" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="40" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1434CB">VISA</text>
      <path d="M45 15L40 25L50 25L45 15Z" fill="#FAA61A"/>
    </g>
    
    <!-- MasterCard -->
    <g transform="translate(130, 0)">
      <rect width="100" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <circle cx="70" cy="20" r="12" fill="#EB001B"/>
      <circle cx="80" cy="20" r="12" fill="#F79E1B"/>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#ffffff">MasterCard</text>
    </g>
    
    <!-- PayPal -->
    <g transform="translate(250, 0)">
      <rect width="90" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0070BA">Pay</text>
      <text x="45" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#003087">Pal</text>
      <text x="70" y="25" font-family="Arial, sans-serif" font-size="8" fill="#000000">™</text>
    </g>
    
    <!-- American Express -->
    <g transform="translate(360, 0)">
      <rect width="120" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <rect x="10" y="8" width="100" height="24" rx="2" fill="none" stroke="#006FCF" stroke-width="2"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#006FCF">AMERICAN</text>
      <text x="15" y="32" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#006FCF">EXPRESS</text>
    </g>
    
    <!-- Stripe -->
    <g transform="translate(500, 0)">
      <rect width="70" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="35" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#635BFF" font-style="italic">stripe</text>
    </g>
  </g>
</svg>
